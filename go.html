<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirect</title>
</head>
<body style="background:#1c1c1e;color:white;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;">
    <div>Переход...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const url = params.get('url');

        if (url) {
            window.location.href = decodeURIComponent(url);
        } else {
            document.body.innerHTML = '<div style="text-align:center;">Неверная ссылка</div>';
        }
    </script>
</body>
</html>
