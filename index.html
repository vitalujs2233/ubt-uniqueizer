<script>
    const CLOUD_NAME = 'de7pheovq';
    const UPLOAD_PRESET = 'ubt_preset';
    const BITLY_TOKEN = "9e03768933462626ec2c3b02d4ccfc88a39a31c1";

    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) {
        tg.expand();
        tg.ready();
    }

    function showSection(section) {
        const sections = ['main-menu', 'video-section', 'link-section', 'spy-section'];
        sections.forEach((s) => document.getElementById(s).classList.add('hidden'));
        document
            .getElementById(section === 'main' ? 'main-menu' : section + '-section')
            .classList.remove('hidden');
    }

    function buildDownloadUrl(url) {
        if (!url || !url.includes('/upload/')) return url;
        return url.replace('/upload/', '/upload/fl_attachment/');
    }

    const videoInput = document.getElementById('videoInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const selectedFileName = document.getElementById('selectedFileName');
    const statusMessage = document.getElementById('statusMessage');
    const resultBox = document.getElementById('resultBox');
    const resultLink = document.getElementById('resultLink');

    const linkInput = document.getElementById('linkInput');
    const generateLinkBtn = document.getElementById('generateLinkBtn');
    const generatedLinkBox = document.getElementById('generatedLinkBox');
    const generatedLink = document.getElementById('generatedLink');

    let selectedFile = null;

    // ================= VIDEO =================

    videoInput.addEventListener('change', function (event) {
        const file = event.target.files[0];

        resultBox.classList.add('hidden');
        resultLink.innerHTML = '';

        if (!file) {
            selectedFile = null;
            selectedFileName.textContent = 'Видео не выбрано';
            statusMessage.textContent = '';
            return;
        }

        selectedFile = file;
        selectedFileName.textContent = `Выбрано: ${file.name}`;
        statusMessage.textContent = 'Видео выбрано. Нажми "Уникализировать".';
    });

    uploadBtn.addEventListener('click', async function () {
        if (!selectedFile) {
            statusMessage.textContent = 'Сначала выбери видео.';
            return;
        }

        uploadBtn.disabled = true;
        uploadBtn.classList.add('btn-disabled');
        uploadBtn.textContent = 'Загрузка...';
        statusMessage.textContent = 'Загружаем видео...';
        resultBox.classList.add('hidden');

        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('upload_preset', UPLOAD_PRESET);

        try {
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.secure_url) {
                statusMessage.textContent = 'Готово!';

                const watchUrl = data.secure_url;
                const downloadUrl = buildDownloadUrl(data.secure_url);

                resultLink.innerHTML = `
                    <div class="flex flex-col gap-3 mt-2">
                        <a href="${watchUrl}" target="_blank"
                           class="bg-blue-500 text-white p-3 rounded-lg text-center font-semibold">
                           👁️ Смотреть видео
                        </a>

                        <a href="${downloadUrl}" target="_blank" download
                           class="bg-green-500 text-white p-3 rounded-lg text-center font-semibold">
                           ⬇️ Скачать видео
                        </a>
                    </div>
                `;

                resultBox.classList.remove('hidden');
            } else {
                statusMessage.textContent = 'Ошибка загрузки';
                console.log(data);
            }
        } catch (error) {
            statusMessage.textContent = 'Ошибка соединения';
            console.error(error);
        } finally {
            uploadBtn.disabled = false;
            uploadBtn.classList.remove('btn-disabled');
            uploadBtn.textContent = 'Уникализировать';
        }
    });

    // ================= BITLY =================

    generateLinkBtn.addEventListener('click', async function () {
        const url = linkInput.value.trim();

        if (!url) {
            alert('Вставь ссылку');
            return;
        }

        generatedLinkBox.classList.remove('hidden');
        generatedLink.textContent = "Сокращаем...";

        try {
            const response = await fetch("https://api-ssl.bitly.com/v4/shorten", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${BITLY_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    long_url: url
                })
            });

            const data = await response.json();

            if (data.link) {
                generatedLink.href = data.link;
                generatedLink.textContent = data.link;
            } else {
                generatedLink.textContent = "Ошибка Bitly";
                console.log(data);
            }

        } catch (error) {
            generatedLink.textContent = "Ошибка соединения";
            console.error(error);
        }
    });
</script>
