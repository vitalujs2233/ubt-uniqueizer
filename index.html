<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>UBT ToolKit — премиум инструменты для арбитража</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #03050B;
            --bg-surface: #0A0F1C;
            --bg-card: rgba(15, 25, 45, 0.65);
            --stroke-light: rgba(255, 255, 255, 0.06);
            --stroke-glow: rgba(139, 92, 246, 0.3);
            --text-primary: #FFFFFF;
            --text-secondary: #A1A8C3;
            --accent-violet: #8B5CF6;
            --accent-blue: #3B82F6;
            --accent-green: #10B981;
            --accent-gold: #FBBF24;
            --gradient-primary: linear-gradient(135deg, var(--accent-violet), var(--accent-blue));
            --gradient-success: linear-gradient(135deg, var(--accent-green), #34D399);
            --shadow-glow: 0 8px 20px rgba(59, 130, 246, 0.2);
            --radius-card: 28px;
            --radius-btn: 32px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 10% 0%, rgba(139, 92, 246, 0.12), transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.08), transparent 45%),
                        var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            padding: 20px 16px 0;
            min-height: 100vh;
        }

        /* Утилиты */
        .hidden { display: none; }
        .page-wrap { max-width: 720px; margin: 0 auto; padding-bottom: 100px; }

        /* Стеклянные карточки */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--stroke-light);
            border-radius: var(--radius-card);
            transition: all 0.2s ease;
        }

        /* Анимации */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards; }

        @keyframes skeleton-pulse {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.5s infinite;
            border-radius: 12px;
        }

        /* Кнопки */
        .btn-primary, .btn-success, .btn-secondary, .btn-gold {
            border: none;
            border-radius: var(--radius-btn);
            padding: 14px 20px;
            font-weight: 600;
            transition: transform 0.16s, box-shadow 0.16s;
            cursor: pointer;
        }
        .btn-primary { background: var(--gradient-primary); box-shadow: var(--shadow-glow); color: white; }
        .btn-success { background: var(--gradient-success); box-shadow: 0 8px 20px rgba(16,185,129,0.2); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.08); border: 1px solid var(--stroke-light); backdrop-filter: blur(4px); }
        .btn-gold { background: linear-gradient(135deg, #F59E0B, #FBBF24); box-shadow: 0 8px 20px rgba(245,158,11,0.2); color: #1e293b; }
        .btn-primary:active, .btn-success:active, .btn-secondary:active, .btn-gold:active { transform: scale(0.98); }

        /* Инпут */
        .neo-input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 32px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--stroke-light);
            color: white;
            font-size: 16px;
            transition: all 0.2s;
        }
        .neo-input:focus {
            border-color: var(--accent-violet);
            outline: none;
            box-shadow: 0 0 0 3px rgba(139,92,246,0.2);
        }

        /* Нижняя навигация */
        .bottom-nav {
            background: rgba(10, 20, 35, 0.85);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--stroke-light);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 20px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            transition: color 0.2s;
        }
        .nav-item.active { color: white; }
        .nav-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .nav-item.active .nav-icon {
            background: rgba(139,92,246,0.2);
            box-shadow: 0 0 12px rgba(139,92,246,0.3);
        }

        /* Метрики */
        .metric-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--stroke-light);
            border-radius: 24px;
            padding: 16px;
        }
        .metric-value {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
        }

        /* Модалка */
        .modal-glass {
            background: rgba(12, 20, 35, 0.96);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            border: 1px solid var(--stroke-light);
        }

        /* Прогресс-бар */
        .progress-bar-custom {
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--gradient-primary);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <!-- Шапка -->
    <div id="userBar" class="mb-5 hidden fade-up">
        <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <div id="userAvatarWrap" class="w-12 h-12 rounded-full bg-gradient-to-br from-violet-600 to-blue-600 flex items-center justify-center text-white font-bold text-sm overflow-hidden">
                    <img id="userAvatar" class="hidden w-full h-full object-cover" alt="avatar" />
                    <span id="userAvatarFallback">U</span>
                </div>
                <div>
                    <div id="userName" class="font-bold text-white text-base">Пользователь</div>
                    <div id="userBalance" class="text-sm text-secondary">Баланс: 0 кредитов</div>
                </div>
            </div>
            <button id="topupBtn" class="btn-success px-5 py-3 rounded-2xl font-bold text-sm">⭐ Пополнить</button>
        </div>
    </div>

    <!-- Главный экран -->
    <div id="home-screen">
        <div id="main-menu" class="fade-up">
            <div class="grid grid-cols-2 gap-3">
                <!-- Уникализатор (большая карточка) -->
                <div class="glass-card col-span-2 p-5 cursor-pointer" onclick="showSection('video')">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-xs uppercase tracking-wider text-violet-300 mb-1">Core Tool</div>
                            <h2 class="text-2xl font-extrabold">Уникализатор видео</h2>
                            <p class="text-sm text-secondary mt-2">Очистка метаданных, подготовка к заливу</p>
                        </div>
                        <div class="w-14 h-14 rounded-3xl bg-gradient-to-br from-violet-500/20 to-blue-500/20 flex items-center justify-center text-3xl">🎥</div>
                    </div>
                    <div class="flex justify-between items-end mt-4">
                        <span class="text-xs text-muted">FAST · PREMIUM</span>
                        <span class="btn-primary text-sm px-4 py-2 rounded-2xl">Открыть</span>
                    </div>
                </div>

                <!-- Смарт-линк -->
                <div class="glass-card p-4 cursor-pointer" onclick="showSection('link')">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-base">Смарт-линк</span>
                        <div class="w-10 h-10 rounded-2xl bg-blue-500/15 flex items-center justify-center text-xl">🔗</div>
                    </div>
                    <div class="mt-3 text-xs text-secondary">Трекинг и маскировка</div>
                    <div class="mt-2 text-sm">Сокращай, отслеживай, анализируй</div>
                </div>

                <!-- Тренды -->
                <div class="glass-card p-4 cursor-pointer" onclick="showSection('spy')">
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="font-bold text-base">Тренды</div>
                            <div class="text-xs text-secondary">ТОП креативы дня</div>
                        </div>
                        <div class="w-10 h-10 rounded-2xl bg-violet-500/15 flex items-center justify-center text-xl">🔥</div>
                    </div>
                    <div class="mt-3 relative overflow-hidden rounded-2xl h-28">
                        <img src="https://res.cloudinary.com/de7pheovq/image/upload/v1774706380/Screenshot_1_fygecs.png" class="w-full h-full object-cover opacity-80" />
                        <div class="absolute bottom-2 left-2"><span class="glow-badge text-xs px-2 py-1 rounded-full">ТОП КРЕО</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
