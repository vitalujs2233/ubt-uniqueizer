<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>UBT ToolKit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1c1c1e;
            color: white;
            font-family: sans-serif;
        }

        .card {
            background: #2c2c2e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 1px solid #3a3a3c;
        }

        .hidden {
            display: none;
        }

        .btn-disabled {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>

<body class="p-4">
<h1 class="text-2xl font-bold mb-6 text-center text-blue-400">UBT ToolKit</h1>

<!-- МЕНЮ -->
<div id="main-menu">
    <div class="card" onclick="showSection('video')">
        🎥 Уникализатор видео
    </div>

    <div class="card" onclick="showSection('link')">
        🔗 Смарт-линк
    </div>

    <div class="card" onclick="showSection('spy')">
        🔥 Тренды
    </div>
</div>

<!-- ВИДЕО -->
<div id="video-section" class="hidden">
    <button onclick="showSection('main')">← Назад</button>

    <input type="file" id="videoInput" accept="video/*">
    <button id="uploadBtn">Уникализировать</button>

    <div id="statusMessage"></div>
    <div id="resultBox" class="hidden">
        <div id="resultLink"></div>
    </div>
</div>

<!-- СМАРТ ЛИНК -->
<div id="link-section" class="hidden">
    <button onclick="showSection('main')">← Назад</button>

    <input id="linkInput"
        type="text"
        placeholder="https://your-offer.com"
        class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 mb-4 outline-none">

    <button id="generateLinkBtn"
        class="w-full bg-blue-600 p-4 rounded-xl font-bold">
        Сгенерировать
    </button>

    <div id="generatedLinkBox" class="mt-4 hidden bg-gray-800 p-4 rounded-xl">
        <p>✅ Ссылка готова</p>
        <a id="generatedLink" target="_blank"></a>
    </div>
</div>

<!-- СПАЙ -->
<div id="spy-section" class="hidden">
    <button onclick="showSection('main')">← Назад</button>
    Скоро...
</div>

<script>
const CLOUD_NAME = 'de7pheovq';
const UPLOAD_PRESET = 'ubt_preset';

function showSection(section) {
    const sections = ['main-menu','video-section','link-section','spy-section'];
    sections.forEach(s => document.getElementById(s).classList.add('hidden'));

    document.getElementById(
        section === 'main' ? 'main-menu' : section + '-section'
    ).classList.remove('hidden');
}

// ================== VIDEO ==================

function buildDownloadUrl(url) {
    return url.replace('/upload/', '/upload/fl_attachment/');
}

let selectedFile = null;

videoInput.onchange = (e)=>{
    selectedFile = e.target.files[0];
};

uploadBtn.onclick = async ()=>{
    if(!selectedFile) return alert("Выбери видео");

    statusMessage.innerText = "Загрузка...";

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('upload_preset', UPLOAD_PRESET);

    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`,{
        method:'POST',
        body:formData
    });

    const data = await res.json();

    const watch = data.secure_url;
    const download = buildDownloadUrl(watch);

    resultLink.innerHTML = `
        <a href="${watch}" target="_blank">👁️ Смотреть</a><br>
        <a href="${download}" target="_blank">⬇️ Скачать</a>
    `;

    resultBox.classList.remove('hidden');
    statusMessage.innerText = "Готово";
};

// ================== SMART LINK ==================

generateLinkBtn.onclick = ()=>{
    const url = linkInput.value.trim();

    if(!url) return alert("Вставь ссылку");

    const encoded = encodeURIComponent(url);

    const smartLink = `${window.location.origin}/go?url=${encoded}`;

    generatedLink.href = smartLink;
    generatedLink.textContent = smartLink;

    generatedLinkBox.classList.remove('hidden');
};
</script>

</body>
</html>
