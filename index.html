<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UBT ToolKit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body class="bg-[#1c1c1e] text-white p-4">

<h1 class="text-2xl text-center text-blue-400 mb-6 font-bold">UBT ToolKit</h1>

<!-- МЕНЮ -->
<div id="main-menu">
    <div onclick="showSection('video')" class="bg-[#2c2c2e] p-4 rounded-xl mb-3">
        🎥 Уникализатор видео
    </div>

    <div onclick="showSection('link')" class="bg-[#2c2c2e] p-4 rounded-xl mb-3">
        🔗 Смарт-линк
    </div>
</div>

<!-- ВИДЕО -->
<div id="video-section" class="hidden">
    <button onclick="showSection('main')" class="mb-4">← Назад</button>

    <input type="file" id="videoInput" class="mb-4" />
    <button id="uploadBtn" class="bg-blue-600 p-3 rounded-xl w-full">
        Уникализировать
    </button>

    <div id="statusMessage" class="mt-3"></div>
    <div id="resultBox" class="mt-3 hidden"></div>
</div>

<!-- ССЫЛКИ -->
<div id="link-section" class="hidden">
    <button onclick="showSection('main')" class="mb-4">← Назад</button>

    <input id="linkInput" class="w-full p-3 rounded bg-gray-800 mb-3"
           placeholder="https://site.com" />

    <button id="generateLinkBtn" class="bg-blue-600 p-3 rounded-xl w-full">
        Сгенерировать
    </button>

    <div id="generatedLinkBox" class="mt-4 hidden">
        <a id="generatedLink" target="_blank" class="text-blue-400"></a>
    </div>
</div>

<script>
const CLOUD_NAME = 'de7pheovq';
const UPLOAD_PRESET = 'ubt_preset';

/* ============================= */
/* 🔴 ВСТАВЬ СЮДА СВОЙ TOKEN 🔴 */
/* ============================= */
const BITLY_TOKEN = "9e03768933462626ec2c3b02d4ccfc88a39a31c1";
/* ============================= */

function showSection(section){
    document.getElementById('main-menu').style.display='none';
    document.getElementById('video-section').style.display='none';
    document.getElementById('link-section').style.display='none';

    if(section==='main') document.getElementById('main-menu').style.display='block';
    if(section==='video') document.getElementById('video-section').style.display='block';
    if(section==='link') document.getElementById('link-section').style.display='block';
}

/* ================= VIDEO ================= */

document.getElementById('uploadBtn').onclick = async () => {
    const file = document.getElementById('videoInput').files[0];
    if(!file) return alert("Выбери видео");

    const form = new FormData();
    form.append("file", file);
    form.append("upload_preset", UPLOAD_PRESET);

    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
        method: "POST",
        body: form
    });

    const data = await res.json();

    document.getElementById('statusMessage').innerText = "Готово";

    document.getElementById('resultBox').innerHTML = `
        <a href="${data.secure_url}" target="_blank">Смотреть</a>
    `;
    document.getElementById('resultBox').style.display='block';
};

/* ================= BITLY ================= */

document.getElementById('generateLinkBtn').onclick = async () => {
    const url = document.getElementById('linkInput').value;

    if(!url) return alert("Вставь ссылку");

    const res = await fetch("https://api-ssl.bitly.com/v4/shorten", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + BITLY_TOKEN,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            long_url: url
        })
    });

    const data = await res.json();

    document.getElementById('generatedLinkBox').style.display='block';
    document.getElementById('generatedLink').innerText = data.link;
    document.getElementById('generatedLink').href = data.link;
};
</script>

</body>
</html>
