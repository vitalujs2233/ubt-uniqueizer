<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UBT ToolKit - Dvizh Updated</title>
</head>
<body>

<!-- DVIZH SECTION -->
<div id="dvizh-section">
  <h2>🔥 Движ</h2>

  <div id="feed"></div>

  <button onclick="openModal()">+</button>
</div>

<!-- MODAL -->
<div id="modal" style="display:none;">
  <textarea id="text"></textarea>
  <input type="file" id="images" multiple>
  <button onclick="createPost()">Опубликовать • 5 кредитов</button>
</div>

<script>
function openModal() {
  document.getElementById('modal').style.display = 'block';
}

function createPost() {
  const text = document.getElementById('text').value;
  const feed = document.getElementById('feed');

  const post = document.createElement('div');
  post.innerHTML = `
    <div>
      <b>User</b> • сейчас
      <p>${text}</p>
      <div>❤️ 0 💬 0 👁 1 💰</div>
    </div>
  `;

  feed.prepend(post);
  document.getElementById('modal').style.display = 'none';
}
</script>

</body>
</html>
