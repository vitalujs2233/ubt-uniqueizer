<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UBT ToolKit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org"></script>
    <style>
        body { background-color: #1c1c1e; color: white; font-family: sans-serif; -webkit-user-select: none; }
        .card { background: #2c2c2e; border-radius: 12px; padding: 20px; margin-bottom: 15px; cursor: pointer; border: 1px solid #3a3a3c; }
        .card:active { background: #3a3a3c; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">
    <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">UBT ToolKit</h1>
    
    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="main-menu">
        <div class="card" onclick="showSection('video')">
            <h2 class="text-lg font-semibold">🎥 Уникализатор видео</h2>
            <p class="text-sm text-gray-400">Очистка метаданных и фильтры</p>
        </div>
        
        <div class="card" onclick="showSection('link')">
            <h2 class="text-lg font-semibold">🔗 Смарт-линк</h2>
            <p class="text-sm text-gray-400">Маскировка ссылок для соцсетей</p>
        </div>
        
        <div class="card" onclick="showSection('spy')">
            <h2 class="text-lg font-semibold">🔥 Тренды (Spy)</h2>
            <p class="text-sm text-gray-400">Топ креативов недели</p>
        </div>
    </div>

    <!-- РАЗДЕЛ ВИДЕО -->
    <div id="video-section" class="hidden">
        <button onclick="showSection('main')" class="mb-4 text-blue-400">← Назад</button>
        <h2 class="text-xl mb-4 font-bold">Уникализатор</h2>
        <div class="bg-gray-800 p-8 rounded-xl border-2 border-dashed border-gray-600 text-center">
            <input type="file" id="videoInput" class="hidden" accept="video/*">
            <label for="videoInput" class="cursor-pointer text-blue-400 block">Нажми, чтобы выбрать видео</label>
        </div>
        <button class="mt-6 w-full bg-blue-600 p-4 rounded-xl font-bold">Уникализировать</button>
    </div>

    <!-- РАЗДЕЛ ССЫЛКИ -->
    <div id="link-section" class="hidden">
        <button onclick="showSection('main')" class="mb-4 text-blue-400">← Назад</button>
        <h2 class="text-xl mb-4 font-bold">Смарт-линк</h2>
        <input type="text" placeholder="https://your-offer.com" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 mb-4 outline-none">
        <button class="w-full bg-blue-600 p-4 rounded-xl font-bold">Сгенерировать</button>
    </div>

    <!-- РАЗДЕЛ ТРЕНДЫ -->
    <div id="spy-section" class="hidden">
        <button onclick="showSection('main')" class="mb-4 text-blue-400">← Назад</button>
        <h2 class="text-xl mb-4 font-bold">Тренды УБТ</h2>
        <div class="p-4 bg-gray-800 rounded-lg text-sm text-gray-400">Тут скоро появятся ссылки на топовые креативы из TikTok и Reels...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function showSection(section) {
            const sections = ['main-menu', 'video-section', 'link-section', 'spy-section'];
            sections.forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(section === 'main' ? 'main-menu' : section + '-section').classList.remove('hidden');
        }
    </script>
</body>
</html>
