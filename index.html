<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>UBT ToolKit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1c1c1e;
            color: white;
            font-family: sans-serif;
            -webkit-user-select: none;
        }

        .card {
            background: #2c2c2e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 1px solid #3a3a3c;
        }

        .card:active {
            background: #3a3a3c;
        }

        .hidden {
            display: none;
        }

        .btn-disabled {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body class="p-4">
    <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">UBT ToolKit</h1>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="main-menu">
        <div class="card" onclick="showSection('video')">
            <h2 class="text-lg font-semibold">🎥 Уникализатор видео</h2>
            <p class="text-sm text-gray-400">Очистка метаданных и фильтры</p>
        </div>

        <div class="card" onclick="showSection('link')">
            <h2 class="text-lg font-semibold">🔗 Смарт-линк</h2>
            <p class="text-sm text-gray-400">Маскировка ссылок для соцсетей</p>
        </div>

        <div class="card" onclick="showSection('spy')">
            <h2 class="text-lg font-semibold">🔥 Тренды (Spy)</h2>
            <p class="text-sm text-gray-400">Топ креативов недели</p>
        </div>
    </div>

    <!-- РАЗДЕЛ ВИДЕО -->
    <div id="video-section" class="hidden">
        <button onclick="showSection('main')" class="mb-4 text-blue-400">← Назад</button>
        <h2 class="text-xl mb-4 font-bold">Уникализатор</h2>

        <div class="bg-gray-800 p-8 rounded-xl border-2 border-dashed border-gray-600 text-center">
            <input type="file" id="videoInput" class="hidden" accept="video/*" />
            <label for="videoInput" class="cursor-pointer text-blue-400 block">
                Нажми, чтобы выбрать видео
            </label>
            <p id="selectedFileName" class="mt-3 text-sm text-gray-400">Видео не выбрано</p>
        </div>

        <button id="uploadBtn" class="mt-6 w-full bg-blue-600 p-4 rounded-xl font-bold">
            Уникализировать
        </button>

        <div id="statusMessage" class="mt-4 text-sm text-gray-300"></div>

        <div id="resultBox" class="mt-4 hidden bg-gray-800 p-4 rounded-xl border border-gray-700">
            <p class="text-green-400 font-semibold mb-2">✅ Видео обработано</p>
            <div id="resultLink"></div>
        </div>
    </div>

    <!-- РАЗДЕЛ ССЫЛКИ -->
    <div id="link-section" class="hidden">
        <button onclick="showSection('main')" class="mb-4 text-blue-400">← Назад</button>
        <h2 class="text-xl mb-4 font-bold">Смарт-линк</h2>

        <input
            id="linkInput"
            type="text"
            placeholder="https://your-offer.com"
            class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 mb-4 outline-none"
        />

        <button
            id="generateLinkBtn"
            class="w-full bg-blue-600 p-4 rounded-xl font-bold">
            Сгенерировать
        </button>

        <div id="generatedLinkBox" class="mt-4 hidden bg-gray-800 p-4 rounded-xl border border-gray-700">
            <p class="text-green-400 font-semibold mb-2">✅ Ссылка готова</p>
            <a id="generatedLink" target="_blank" class="text-blue-400 break-all underline block mb-3"></a>

            <div class="flex gap-3">
                <button
                    id="copyLinkBtn"
                    class="w-1/2 bg-green-600 p-4 rounded-xl font-bold">
                    📋 Скопировать
                </button>

                <a
                    id="openLinkBtn"
                    href="#"
                    target="_blank"
                    class="w-1/2 bg-blue-600 p-4 rounded-xl font-bold text-center hidden">
                    🔗 Открыть ссылку
                </a>
            </div>

            <p id="copyStatus" class="mt-3 text-sm text-gray-300"></p>
        </div>
    </div>

    <!-- РАЗДЕЛ ТРЕНДЫ -->
    <div id="spy-section" class="hidden">
        <button onclick="showSection('main')" class="mb-4 text-blue-400">← Назад</button>
        <h2 class="text-xl mb-4 font-bold">🔥 Тренды УБТ</h2>

        <div class="flex gap-2 overflow-x-auto mb-4 pb-2">
            <button onclick="filterSpy('all', this)" class="spy-filter bg-blue-600 px-3 py-2 rounded-lg text-sm whitespace-nowrap">Все</button>
            <button onclick="filterSpy('dating', this)" class="spy-filter bg-gray-700 px-3 py-2 rounded-lg text-sm whitespace-nowrap">Дейтинг</button>
            <button onclick="filterSpy('crypto', this)" class="spy-filter bg-gray-700 px-3 py-2 rounded-lg text-sm whitespace-nowrap">Крипта</button>
            <button onclick="filterSpy('gambling', this)" class="spy-filter bg-gray-700 px-3 py-2 rounded-lg text-sm whitespace-nowrap">Гемблинг</button>
            <button onclick="filterSpy('nutra', this)" class="spy-filter bg-gray-700 px-3 py-2 rounded-lg text-sm whitespace-nowrap">Нутра</button>
        </div>

        <div id="spyList" class="flex flex-col gap-4"></div>
    </div>

    <script>
        const CLOUD_NAME = 'de7pheovq';
        const UPLOAD_PRESET = 'ubt_preset';

        // ВСТАВЬ СЮДА СВОЙ АКТУАЛЬНЫЙ BITLY TOKEN
        const BITLY_TOKEN = "20780b383049d50d149180d910a56fa2158a9a91";

        const spyTrends = [
            {
                title: "Dating Hook - Chat Message",
                niche: "dating",
                platform: "TikTok",
                week: "ТОП недели",
                image: "https://res.cloudinary.com/de7pheovq/image/upload/v1774706380/Screenshot_1_fygecs.png"
            },
            {
                title: "Dating UGC Warm Opening",
                niche: "dating",
                platform: "Reels",
                week: "ТОП недели",
                image: "https://res.cloudinary.com/de7pheovq/image/upload/v1774706380/Screenshot_6_xiaazz.png"
            },
            {
                title: "Crypto Rich Lifestyle",
                niche: "crypto",
                platform: "TikTok",
                week: "ТОП недели",
                image: "https://res.cloudinary.com/de7pheovq/image/upload/v1774707531/Screenshot_9_fqfanz.png"
            },
            {
                title: "Crypto Fast Hook Ad",
                niche: "crypto",
                platform: "Reels",
                week: "ТОП недели",
                image: "https://res.cloudinary.com/de7pheovq/image/upload/v1774707531/Screenshot_10_xyid9a.png"
            },
            {
                title: "Casino Big Win",
                niche: "gambling",
                platform: "TikTok",
                week: "ТОП недели",
                image: "https://res.cloudinary.com/de7pheovq/image/upload/v1774706794/Screenshot_5_fj9uma.png"
            },
            {
                title: "Slots Bonus Creative",
                niche: "gambling",
                platform: "Reels",
                week: "ТОП недели",
                image: "https://res.cloudinary.com/de7pheovq/image/upload/v1774706794/Screenshot_4_moh3qi.png"
            },
            {
                title: "Weight Loss Before/After",
                niche: "nutra",
                platform: "TikTok",
                week: "ТОП недели",
                image: "https://res.cloudinary.com/de7pheovq/image/upload/v1774707115/Screenshot_7_eelvre.png"
            },
            {
                title: "Nutra Problem Solution",
                niche: "nutra",
                platform: "Reels",
                week: "ТОП недели",
                image: "https://res.cloudinary.com/de7pheovq/image/upload/v1774707115/Screenshot_8_s8ytms.png"
            }
        ];

        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        function showSection(section) {
            const sections = ['main-menu', 'video-section', 'link-section', 'spy-section'];
            sections.forEach((s) => document.getElementById(s).classList.add('hidden'));
            document
                .getElementById(section === 'main' ? 'main-menu' : section + '-section')
                .classList.remove('hidden');
        }

        function buildDownloadUrl(url) {
            if (!url || !url.includes('/upload/')) return url;
            return url.replace('/upload/', '/upload/fl_attachment/');
        }

        let currentFilter = 'all';

        function filterSpy(niche, button) {
            currentFilter = niche;
            renderSpyTrends();

            document.querySelectorAll('.spy-filter').forEach(btn => {
                btn.classList.remove('bg-blue-600');
                btn.classList.add('bg-gray-700');
            });

            if (button) {
                button.classList.remove('bg-gray-700');
                button.classList.add('bg-blue-600');
            }
        }

        function renderSpyTrends() {
            const spyList = document.getElementById('spyList');
            if (!spyList) return;

            spyList.innerHTML = '';

            const filtered = currentFilter === 'all'
                ? spyTrends
                : spyTrends.filter(item => item.niche === currentFilter);

            filtered.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'bg-gray-800 p-4 rounded-xl border border-gray-700';

                card.innerHTML = `
                    <div class="overflow-hidden rounded-xl mb-4 border border-gray-700">
                        <img src="${item.image}" alt="${item.title}" class="w-full h-auto block" />
                    </div>

                    <div class="flex items-center justify-between mb-2 gap-2">
                        <h3 class="text-lg font-semibold">${item.title}</h3>
                        <span class="text-xs bg-red-600 px-2 py-1 rounded-full whitespace-nowrap">${item.week}</span>
                    </div>

                    <div class="flex gap-2 flex-wrap mb-4">
                        <span class="text-xs bg-gray-700 px-3 py-1 rounded-full">Платформа: ${item.platform}</span>
                        <span class="text-xs bg-blue-700 px-3 py-1 rounded-full">${item.niche.toUpperCase()}</span>
                    </div>

                    <div class="flex gap-3">
                        <a href="${item.image}" target="_blank"
                           class="w-1/2 bg-blue-600 text-white p-3 rounded-lg text-center font-semibold">
                           👁️ Открыть
                        </a>

                        <a href="${item.image}" download
                           class="w-1/2 bg-green-600 text-white p-3 rounded-lg text-center font-semibold">
                           ⬇️ Скачать
                        </a>
                    </div>
                `;

                spyList.appendChild(card);
            });

            if (filtered.length === 0) {
                spyList.innerHTML = `
                    <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 text-gray-400 text-center">
                        Пока нет креативов в этой нише
                    </div>
                `;
            }
        }

        const videoInput = document.getElementById('videoInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const selectedFileName = document.getElementById('selectedFileName');
        const statusMessage = document.getElementById('statusMessage');
        const resultBox = document.getElementById('resultBox');
        const resultLink = document.getElementById('resultLink');

        const linkInput = document.getElementById('linkInput');
        const generateLinkBtn = document.getElementById('generateLinkBtn');
        const generatedLinkBox = document.getElementById('generatedLinkBox');
        const generatedLink = document.getElementById('generatedLink');
        const copyLinkBtn = document.getElementById('copyLinkBtn');
        const openLinkBtn = document.getElementById('openLinkBtn');
        const copyStatus = document.getElementById('copyStatus');

        let selectedFile = null;

        // ===== ВИДЕО =====
        videoInput.addEventListener('change', function (event) {
            const file = event.target.files[0];

            resultBox.classList.add('hidden');
            resultLink.innerHTML = '';

            if (!file) {
                selectedFile = null;
                selectedFileName.textContent = 'Видео не выбрано';
                statusMessage.textContent = '';
                return;
            }

            selectedFile = file;
            selectedFileName.textContent = `Выбрано: ${file.name}`;
            statusMessage.textContent = 'Видео выбрано. Нажми "Уникализировать".';
        });

        uploadBtn.addEventListener('click', async function () {
            if (!selectedFile) {
                statusMessage.textContent = 'Сначала выбери видео.';
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.classList.add('btn-disabled');
            uploadBtn.textContent = 'Загрузка...';
            statusMessage.textContent = 'Загружаем видео...';
            resultBox.classList.add('hidden');

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('upload_preset', UPLOAD_PRESET);

            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.secure_url) {
                    statusMessage.textContent = 'Готово!';

                    const watchUrl = data.secure_url;
                    const downloadUrl = buildDownloadUrl(data.secure_url);

                    resultLink.innerHTML = `
                        <div class="flex flex-col gap-3 mt-2">
                            <a href="${watchUrl}" target="_blank"
                               class="bg-blue-500 text-white p-3 rounded-lg text-center font-semibold">
                               👁️ Смотреть видео
                            </a>

                            <a href="${downloadUrl}" target="_blank" download
                               class="bg-green-500 text-white p-3 rounded-lg text-center font-semibold">
                               ⬇️ Скачать видео
                            </a>
                        </div>
                    `;

                    resultBox.classList.remove('hidden');
                } else {
                    statusMessage.textContent = 'Ошибка загрузки';
                    console.log(data);
                }
            } catch (error) {
                statusMessage.textContent = 'Ошибка соединения';
                console.error(error);
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.classList.remove('btn-disabled');
                uploadBtn.textContent = 'Уникализировать';
            }
        });

        // ===== BITLY =====
        generateLinkBtn.addEventListener('click', async function () {
            const url = linkInput.value.trim();

            if (!url) {
                alert('Вставь ссылку');
                return;
            }

            generatedLinkBox.classList.remove('hidden');
            generatedLink.textContent = 'Сокращаем...';
            generatedLink.removeAttribute('href');
            copyStatus.textContent = '';
            openLinkBtn.classList.add('hidden');
            openLinkBtn.href = '#';

            try {
                const response = await fetch('https://api-ssl.bitly.com/v4/shorten', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${BITLY_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        long_url: url
                    })
                });

                const data = await response.json();

                if (data.link) {
                    generatedLink.href = data.link;
                    generatedLink.textContent = data.link;

                    openLinkBtn.href = data.link;
                    openLinkBtn.classList.remove('hidden');
                } else {
                    generatedLink.textContent = 'Ошибка Bitly';
                    console.log(data);
                }

            } catch (error) {
                generatedLink.textContent = 'Ошибка соединения';
                console.error(error);
            }
        });

        // ===== КОПИРОВАНИЕ ССЫЛКИ =====
        copyLinkBtn.addEventListener('click', async function () {
            const link = generatedLink.textContent.trim();

            if (!link || link === 'Сокращаем...' || link === 'Ошибка Bitly' || link === 'Ошибка соединения') {
                copyStatus.textContent = 'Сначала создай ссылку.';
                return;
            }

            try {
                await navigator.clipboard.writeText(link);
                copyStatus.textContent = '✅ Ссылка скопирована';
            } catch (error) {
                copyStatus.textContent = 'Не удалось скопировать автоматически. Скопируй вручную.';
                console.error(error);
            }
        });

        renderSpyTrends();
    </script>
</body>
</html>
